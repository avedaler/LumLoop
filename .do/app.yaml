# DigitalOcean App Platform specification for LumLoop
# Deploy via: doctl apps create --spec .do/app.yaml
# Or connect GitHub repo in DigitalOcean dashboard

name: lumloop
region: sgp
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/lumloop
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: node dist/index.cjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 5000
    envs:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "${db.DATABASE_URL}"
        scope: RUN_TIME
    routes:
      - path: /

# Optional: Add managed PostgreSQL database
# databases:
#   - engine: PG
#     name: db
#     num_nodes: 1
#     size: db-s-dev-database
#     version: "16"
